name: Build Paclet

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      submit:
        description: "Submit to Paclet Repository after build"
        type: boolean
        default: false
    outputs:
      paclet_file:
        description: "Path to the built paclet"
        value: ${{ jobs.package.outputs.paclet_file }}
      paclet_version:
        description: "Version of the built paclet"
        value: ${{ jobs.package.outputs.paclet_version }}

permissions:
  contents: write

jobs:
  # Job 1: Build macOS targets natively with Metal GPU support
  build-macos:
    name: Build macOS (Metal GPU)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Rust Toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: rust-macos-${{ hashFiles('ProgramGames/Lib/program-games/Cargo.toml', 'Cargo.toml') }}
          restore-keys: rust-macos-

      - name: Install Rust
        run: |
          if ! command -v rustup &> /dev/null; then
            curl -fsSL https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          fi
          source "$HOME/.cargo/env"
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Cache Cargo Build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-macos-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: cargo-macos-

      - name: Build macOS Targets
        run: |
          source "$HOME/.cargo/env"
          chmod +x build_macos_targets.sh
          ./build_macos_targets.sh

      - name: Upload macOS Binaries
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            target/x86_64-apple-darwin/release/libprogram_games.dylib
            target/aarch64-apple-darwin/release/libprogram_games.dylib
          if-no-files-found: error

  # Job 2: Cross-compile Linux and Windows targets from Linux
  build-cross:
    name: Build Linux/Windows
    runs-on: ubuntu-latest
    container:
      image: wolframresearch/wolframengine:latest
      options: --user root

    env:
      SDKROOT: /nonexistent

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            curl ca-certificates build-essential pkg-config libssl-dev git \
            uuid-dev lld mingw-w64 gcc-aarch64-linux-gnu libc6-dev-arm64-cross gcc-x86-64-linux-gnu
          ln -sf /usr/bin/x86_64-linux-gnu-gcc /usr/bin/x86_64-unknown-linux-gnu-gcc
          ln -sf /usr/bin/aarch64-linux-gnu-gcc /usr/bin/aarch64-unknown-linux-gnu-gcc

      - name: Cache Rust Toolchain
        if: ${{ !env.ACT }}
        id: cache-rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: rust-cross-${{ hashFiles('setup_rust.sh') }}

      - name: Check Rust Cache
        id: check-rust
        run: |
          if [ -f "$HOME/.cargo/bin/rustc" ]; then
            echo "hit=true" >> $GITHUB_OUTPUT
          else
            echo "hit=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Rust
        if: steps.cache-rust.outputs.cache-hit != 'true' && steps.check-rust.outputs.hit != 'true'
        run: |
          chmod +x setup_rust.sh
          ./setup_rust.sh

      - name: Add Rust to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Cargo Registry and Build
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-cross-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: cargo-cross-

      - name: Build Linux/Windows Targets
        run: |
          . $HOME/.cargo/env
          chmod +x build_all_targets.sh
          ./build_all_targets.sh

      - name: Upload Cross-Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: cross-binaries
          path: |
            target/x86_64-unknown-linux-gnu/release/libprogram_games.so
            target/aarch64-unknown-linux-gnu/release/libprogram_games.so
            target/x86_64-pc-windows-gnu/release/program_games.dll
          if-no-files-found: error

  # Job 3: Combine binaries and create paclet
  package:
    name: Package Paclet
    needs: [build-macos, build-cross]
    runs-on: ubuntu-latest
    container:
      image: wolframresearch/wolframengine:latest
      options: --user root

    outputs:
      paclet_file: ${{ steps.find_paclet.outputs.paclet_file }}
      paclet_version: ${{ steps.read_version.outputs.version }}

    env:
      WOLFRAMSCRIPT_ENTITLEMENTID: ${{ secrets.WOLFRAMSCRIPT_ENTITLEMENTID }}
      RESOURCE_PUBLISHER_TOKEN: ${{ secrets.RESOURCE_PUBLISHER_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download macOS Binaries
        uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: target

      - name: Download Cross-Compiled Binaries
        uses: actions/download-artifact@v4
        with:
          name: cross-binaries
          path: target

      - name: Install Rust (needed by CargoCollect for cargo metadata)
        run: |
          curl -fsSL https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Verify Binaries
        run: |
          echo "=== Downloaded binaries ==="
          find target -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.dll" \) -exec ls -lh {} \;

      - name: Build Paclet
        run: |
          . $HOME/.cargo/env
          wolframscript -f ci_build.wl

      - name: Find Paclet File
        id: find_paclet
        run: |
          PACLET_FILE=$(find . -name "*.paclet" -type f | head -1)
          echo "paclet_file=$PACLET_FILE" >> $GITHUB_OUTPUT
          echo "Found paclet: $PACLET_FILE"

      - name: Upload Paclet Artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: ProgramGames-paclet
          path: ${{ steps.find_paclet.outputs.paclet_file }}
          if-no-files-found: error

      - name: Read Paclet Version
        id: read_version
        run: |
          VERSION=$(cat paclet_version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare Release Assets
        id: release_assets
        run: |
          PACLET_FILE="${{ steps.find_paclet.outputs.paclet_file }}"
          STABLE_NAME="ProgramGames.paclet"
          cp "$PACLET_FILE" "$STABLE_NAME"
          echo "stable_file=$STABLE_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        if: ${{ !env.ACT && github.event_name != 'workflow_call' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Development Build (v${{ steps.read_version.outputs.version }})
          files: |
            ${{ steps.find_paclet.outputs.paclet_file }}
            ${{ steps.release_assets.outputs.stable_file }}
          prerelease: true
          make_latest: true

      - name: Submit to Repository
        if: ${{ inputs.submit }}
        run: wolframscript -f ci_submit.wl
